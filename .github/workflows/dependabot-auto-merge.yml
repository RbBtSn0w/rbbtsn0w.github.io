name: "Dependabot Auto Merge"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-dependabot-pr:
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Auto-approve Dependabot PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

  enable-automerge-after-ci:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge only after CI success
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: headSha,
            });

            const pr = prs.data.find(p => p.state === 'open' && p.user?.login === 'dependabot[bot]');
            if (!pr) {
              core.info('No open Dependabot PR associated with this successful CI run.');
              return;
            }

            try {
              await github.graphql(
                `mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    clientMutationId
                  }
                }`,
                { pullRequestId: pr.node_id }
              );
              core.info(`✅ CI passed; auto-merge enabled for Dependabot PR #${pr.number}`);
            } catch (error) {
              core.warning(`⚠️ Could not enable auto-merge for PR #${pr.number}: ${error.message}`);
              core.warning('Ensure repository Auto-merge is enabled in GitHub settings and branch protection allows this bot.');
            }
