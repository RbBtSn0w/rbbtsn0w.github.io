name: "Dependabot Auto Merge"

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_run:
    workflows: ["Build and Deploy"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-dependabot-pr:
    if: github.event_name == 'pull_request_target' && github.actor == 'dependabot[bot]' && !github.event.pull_request.draft
    runs-on: ubuntu-latest

    steps:
      - name: Auto-approve Dependabot PR
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

  enable-automerge-after-ci:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for Dependabot PRs
        uses: actions/github-script@v8
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: headSha,
            });

            // Ensure we only touch non-draft, open PRs created by Dependabot
            const targetPrs = prs.filter(p => 
              p.state === 'open' && 
              !p.draft && 
              p.user.login === 'dependabot[bot]'
            );

            if (targetPrs.length === 0) {
              core.info('No open non-draft Dependabot PRs associated with this successful CI run.');
              return;
            }

            for (const pr of targetPrs) {
              try {
                await github.graphql(
                  `mutation($id: ID!) {
                    enablePullRequestAutoMerge(input: {
                      pullRequestId: $id,
                      mergeMethod: SQUASH
                    }) {
                      clientMutationId
                    }
                  }`,
                  { id: pr.node_id }
                );
                core.info(`✅ Auto-merge enabled for PR #${pr.number}`);
              } catch (error) {
                core.warning(`⚠️ Could not enable auto-merge for PR #${pr.number}: ${error.message}`);
              }
            }
