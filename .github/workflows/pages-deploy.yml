name: "Build and Deploy"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  RUBY_VERSION: "3.2"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build-time: ${{ steps.build-time.outputs.time }}
      site-size: ${{ steps.site-size.outputs.size }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # submodules: true
          # If using the 'assets' git submodule from Chirpy Starter, uncomment above
          # (See: https://github.com/cotes2020/chirpy-starter/tree/main/assets)

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          cache-version: 1

      - name: Install dependencies
        run: |
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Article Translation
        run: |
          echo "🌐 Starting build-time translation (GAS Proxy)..."
          node tools/translate-posts.js
        env:
          GOOGLE_APPS_SCRIPT_URL: ${{ secrets.GOOGLE_APPS_SCRIPT_URL }}
          GOOGLE_APPS_SCRIPT_TOKEN: ${{ secrets.GOOGLE_APPS_SCRIPT_TOKEN }}

      - name: Commit and Push Translations
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -d "assets/translations" ] && [ -n "$(git status --porcelain assets/translations)" ]; then
            git add assets/translations
            git commit -m "chore(translate): update translation deltas [skip ci]"
            git push
          else
            echo "No translation changes to commit."
          fi

      - name: Build site
        id: build
        run: |
          echo "🏗️ Building Jekyll site..."
          bundle exec jekyll build -d "_site" --trace
        env:
          JEKYLL_ENV: "production"

      - name: Record build time
        id: build-time
        run: |
          echo "time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Check site size
        id: site-size
        run: |
          SITE_SIZE=$(du -sh _site | cut -f1)
          echo "size=$SITE_SIZE" >> $GITHUB_OUTPUT
          echo "📊 Site size: $SITE_SIZE"

      - name: Test site
        run: |
          echo "🧪 Running HTML validation..."
          bundle exec htmlproofer _site \
            --disable-external \
            --ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Validate Jekyll configuration
        run: |
          echo "🔍 Validating Jekyll configuration..."
          bundle exec jekyll doctor

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
          retention-days: 7

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📅 Build Time: ${{ needs.build.outputs.build-time }}"
          echo "📊 Site Size: ${{ needs.build.outputs.site-size }}"
          echo "🌐 Live URL: ${{ steps.deployment.outputs.page_url }}"

  # Compatibility check for branch protection rules expecting `test`
  # This avoids duplicate builds while keeping required check names stable.
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && always()
    needs: build
    steps:
      - name: Verify build job result
        run: |
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ 'build' job did not succeed (result: ${{ needs.build.result }})"
            exit 1
          fi
          echo "✅ 'build' job succeeded; compatibility 'test' check passes."

